name: Docker Release

on:
  push:
    tags:
      - 'opg-system/v*'
      - 'opg-gateway/v*'
      - 'opg-web/v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to publish, for example opg-gateway/v1.0.119'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare image matrix
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      matrix: ${{ steps.release.outputs.matrix }}
      release_title: ${{ steps.release.outputs.release_title }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name="${repo_name,,}"
          repo_name="${repo_name//_/-}"
          image_base="ghcr.io/${owner}/${repo_name}"

          case "${tag}" in
            opg-system/v*)
              version="${tag#opg-system/v}"
              release_title="OPG System v${version}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[
                  {name:"opg-system", image:$image_base, target:"opg-all"},
                  {name:"opg-system-gateway", image:($image_base + "-gateway"), target:"gateway-runtime"},
                  {name:"opg-system-web", image:($image_base + "-web"), target:"web-runtime"}
                ]}')"
              ;;
            opg-gateway/v*)
              version="${tag#opg-gateway/v}"
              release_title="OPG Gateway v${version}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[{name:"opg-system-gateway", image:($image_base + "-gateway"), target:"gateway-runtime"}]}')"
              ;;
            opg-web/v*)
              version="${tag#opg-web/v}"
              release_title="OPG Web v${version}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[{name:"opg-system-web", image:($image_base + "-web"), target:"web-runtime"}]}')"
              ;;
            *)
              echo "Unsupported release tag: ${tag}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
          {
            echo 'matrix<<EOF'
            echo "${matrix}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.prepare.outputs.version }}
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: false
          tags: ${{ matrix.image }}:${{ needs.prepare.outputs.version }}
          outputs: type=docker,dest=/tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar
          cache-from: type=gha

      - name: Compress image archive
        shell: bash
        run: |
          set -euo pipefail
          archive="/tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar"
          gzip -9 "${archive}"
          sha256sum "${archive}.gz" > "${archive}.gz.sha256"

      - name: Upload image archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ needs.prepare.outputs.version }}-image
          path: |
            /tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar.gz
            /tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar.gz.sha256
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download image archive artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*-image'
          merge-multiple: true

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_title }}
          make_latest: true
          generate_release_notes: true
          files: release-assets/*

name: Docker Release

on:
  push:
    tags:
      - 'opg-system/v*'
      - 'opg-gateway/v*'
      - 'opg-web/v*'

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare image matrix
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      matrix: ${{ steps.release.outputs.matrix }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name="${repo_name,,}"
          repo_name="${repo_name//_/-}"
          image_base="ghcr.io/${owner}/${repo_name}"

          case "${tag}" in
            opg-system/v*)
              version="${tag#opg-system/v}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[
                  {name:"opg-system", image:$image_base, target:"opg-all"},
                  {name:"opg-system-gateway", image:($image_base + "-gateway"), target:"gateway-runtime"},
                  {name:"opg-system-web", image:($image_base + "-web"), target:"web-runtime"}
                ]}')"
              ;;
            opg-gateway/v*)
              version="${tag#opg-gateway/v}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[{name:"opg-system-gateway", image:($image_base + "-gateway"), target:"gateway-runtime"}]}')"
              ;;
            opg-web/v*)
              version="${tag#opg-web/v}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[{name:"opg-system-web", image:($image_base + "-web"), target:"web-runtime"}]}')"
              ;;
            *)
              echo "Unsupported release tag: ${tag}" >&2
              exit 1
              ;;
          esac

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          {
            echo 'matrix<<EOF'
            echo "${matrix}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.prepare.outputs.version }}
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
